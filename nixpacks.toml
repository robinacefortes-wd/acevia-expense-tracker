[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.tokenizer", "php84Extensions.curl", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.fileinfo", "php84Extensions.gd", "php84Extensions.zip", "php84Extensions.bcmath", "php84Extensions.intl", "php84Extensions.openssl", "composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction", "npm install", "npm run build"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"