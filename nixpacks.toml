[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.tokenizer", "php84Extensions.curl", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.fileinfo", "php84Extensions.gd", "php84Extensions.zip", "php84Extensions.bcmath", "php84Extensions.intl", "php84Extensions.openssl", "composer", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction",
  "npm ci --prefer-offline"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache && chmod -R a+rw storage",
  "php artisan config:cache",
  "php artisan event:cache",
  "php artisan route:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=8080"